services:
  - type: web
    name: quizwitme
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/config
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: quizwitme-db
          property: connectionString

databases:
  - name: quizwitme-db
    plan: free
